name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # to create GitHub Release + upload assets
  packages: write   # to push the container image to ghcr.io

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for `git describe`

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Build release archives (linux/amd64 + linux/arm64)
        run: make release-all VERSION=${{ github.ref_name }}

      - name: Compute checksums
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: dist/*.tar.gz

      - name: Create GitHub Release + attach assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true

  container:
    runs-on: ubuntu-latest
    needs: binaries
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/telfs:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/telfs:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
