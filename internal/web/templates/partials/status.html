{{define "content"}}
<section class="card" hx-get="/partials/status" hx-trigger="every 10s" hx-swap="outerHTML">
  <h3>Active mounts <small>(auto-refresh 10s)</small></h3>
  {{if .Mounts}}
    <ul class="plain">{{range .Mounts}}<li><code>{{.}}</code></li>{{end}}</ul>
  {{else}}
    <p><em>No telfs mounts found.</em></p>
  {{end}}
</section>
{{end}}
